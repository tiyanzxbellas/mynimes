function updateMetaTagsSEO(title, description, image, url = null) {
  document.title = title;
  const finalUrl = url || SITE_URL + '/';
  const finalImage = image || 'https://cloud.tiyan.biz.id/nD6z.jpg';
  const metaUpdates = {
    'description': description,
    'og:title': title,
    'og:description': description,
    'og:image': finalImage,
    'og:url': finalUrl,
    'twitter:title': title,
    'twitter:description': description,
    'twitter:image': finalImage,
    'twitter:url': finalUrl
  };
  for (const [name, content] of Object.entries(metaUpdates)) {
    let meta = document.querySelector(`meta[property="${name}"]`) || document.querySelector(`meta[name="${name}"]`);
    if (meta) { meta.setAttribute('content', content); }
  }
  const canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.setAttribute('href', finalUrl);
}

function updateSchemaForAnime(detail) {
  const oldSchema = document.getElementById('anime-schema');
  if (oldSchema) oldSchema.remove();
  const schema = {
    "@context": "https://schema.org",
    "@type": "Movie",
    "name": detail.judul || 'Unknown Anime',
    "image": detail.cover || 'https://cloud.tiyan.biz.id/nD6z.jpg',
    "description": detail.sinopsis || 'Nonton streaming anime subtitle Indonesia',
    "aggregateRating": detail.rating ? {
      "@type": "AggregateRating",
      "ratingValue": detail.rating,
      "bestRating": "10",
      "worstRating": "1"
    } : undefined,
    "genre": detail.genre || ['Anime'],
    "datePublished": detail.release || '2026'
  };
  Object.keys(schema).forEach(key => schema[key] === undefined && delete schema[key]);
  const script = document.createElement('script');
  script.id = 'anime-schema';
  script.type = 'application/ld+json';
  script.textContent = JSON.stringify(schema);
  document.head.appendChild(script);
}

async function loadAllData() {
  try {
    const data = await fetchAPI('latest?page=1');
    latestData = data;
  } catch(e) { console.error('Failed to load latest:', e); }
  
  try {
    const json = await fetchAPI('schedule');
    scheduleData = json.data;
    if (scheduleData) scheduleData.sort((a, b) => DAY_ORDER.indexOf(a.day) - DAY_ORDER.indexOf(b.day));
  } catch(e) { console.error('Failed to load schedule:', e); }
  
  try {
    moviesData = await fetchAPI('movies');
  } catch(e) { console.error('Failed to load movies:', e); }
  
  try {
    animeListData = await fetchAPI('anime-list');
    for (let key in animeListData) {
      allAnime = allAnime.concat(animeListData[key]);
    }
  } catch(e) { console.error('Failed to load anime-list:', e); }
}

    schedule: 'Jadwal Tayang Anime Hari Ini - AnimeKita',
    movies: 'Anime Movie Sub Indo Terbaru - AnimeKita',
    browse: 'Daftar Anime A-Z Lengkap - AnimeKita',
    genres: 'Genre Anime Terlengkap - AnimeKita',
    search: 'Cari Anime Favoritmu - AnimeKita',
    'api-test': 'API Tester - AnimeKita'
  };
  const descriptions = {
    home: 'Streaming anime subtitle Indonesia gratis. Tonton anime terbaru, ongoing, dan movie favoritmu di AnimeKita!',
    schedule: 'Lihat jadwal tayang anime terbaru setiap harinya. Jangan sampai ketinggalan episode terbaru!',
    movies: 'Koleksi lengkap anime movie sub Indo. Dari classic sampai terbaru, semua ada!',
    browse: 'Browse semua anime dari A-Z. Temukan anime favoritmu dengan mudah.',
    genres: 'Filter anime berdasarkan genre. Action, Romance, Comedy, Fantasy, dan masih banyak lagi!',
    search: 'Cari anime favoritmu di AnimeKita. Ribuan anime siap ditonton!',
    'api-test': 'Uji coba semua endpoint API AnimeKita secara langsung.'
  };
  updateMetaTagsSEO(
    titles[page] || titles.home,
    descriptions[page] || descriptions.home,
    'https://cloud.tiyan.biz.id/nD6z.jpg',
    `${SITE_URL}/${page === 'home' ? '' : page}`
  );
  
  document.querySelectorAll('.page').forEach(p => {
    p.classList.add('hidden');
    p.classList.remove('active');
  });
  const activePage = document.getElementById(`page-${page}`);
  if (activePage) {
    activePage.classList.remove('hidden');
    activePage.classList.add('active', 'fade-in');
  }
  
  document.querySelectorAll('.nav-btn').forEach(btn => {
    if(btn.dataset.page === page) {
      btn.classList.add('text-accent');
      btn.classList.remove('text-gray-400');
    } else {
      btn.classList.remove('text-accent');
      btn.classList.add('text-gray-400');
    }
  });
  
  document.getElementById('search-container').style.display = page === 'search' ? 'block' : 'none';
  
  if (page === 'home') { renderLatest(); renderHomeSchedule(); }
  else if (page === 'schedule') renderSchedulePage();
  else if (page === 'movies') { currentMoviesPage = 1; renderMovies(); }
  else if (page === 'browse') { currentBrowsePage = 1; renderBrowsePage(); }
  else if (page === 'genres') renderGenres();
  else if (page === 'api-test') renderAPITester();
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPaginationUI(containerId, totalItems, currentPageNum, onPageChangeName) {
  const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
  const container = document.getElementById(containerId);
  if (totalPages <= 1) { container.innerHTML = ''; return; }
  
  const goToPageFunc = (newPage) => {
    newPage = parseInt(newPage);
    if (isNaN(newPage) || newPage < 1) newPage = 1;
    if (newPage > totalPages) newPage = totalPages;
    if (onPageChangeName === 'changeBrowsePage') changeBrowsePage(newPage);
    else if (onPageChangeName === 'changeMoviesPage') changeMoviesPage(newPage);
  };
  
  const uniqueId = containerId + '-input';
  container.innerHTML = `
    <button onclick="${onPageChangeName}(${currentPageNum - 1})" ${currentPageNum === 1 ? 'disabled' : ''} class="flex items-center gap-1 px-4 py-2 rounded-xl bg-surface border border-white/10 text-white disabled:opacity-30 disabled:cursor-not-allowed hover:bg-accent transition-all text-xs">
      <i data-lucide="chevron-left" class="w-4 h-4"></i>
      <span>Kembali</span>
    </button>
    <div class="flex items-center gap-1">
      <input type="number" id="${uniqueId}" class="pagination-input" value="${currentPageNum}" min="1" max="${totalPages}" step="1" inputmode="numeric">
      <span class="text-xs text-gray-400">/ ${totalPages}</span>
      <button onclick="document.getElementById('${uniqueId}').value = ''; document.getElementById('${uniqueId}').focus();" class="pagination-go ml-1" aria-label="Go to page">
        <i data-lucide="chevrons-left-right" class="w-4 h-4"></i>
      </button>
    </div>
    <button onclick="${onPageChangeName}(${currentPageNum + 1})" ${currentPageNum === totalPages ? 'disabled' : ''} class="flex items-center gap-1 px-4 py-2 rounded-xl bg-surface border border-white/10 text-white disabled:opacity-30 disabled:cursor-not-allowed hover:bg-accent transition-all text-xs">
      <span>Selanjutnya</span>
      <i data-lucide="chevron-right" class="w-4 h-4"></i>
    </button>
  `;
  
  const inputEl = document.getElementById(uniqueId);
  if (inputEl) {
    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        goToPageFunc(inputEl.value);
        inputEl.blur();
      }
    });
    const goBtn = inputEl.nextElementSibling?.nextElementSibling;
    if (goBtn && goBtn.tagName === 'BUTTON') {
      goBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        goToPageFunc(inputEl.value);
      });
    }
  }
  lucide.createIcons();
}

function changeBrowsePage(page) {
  currentBrowsePage = page;
  renderBrowseContent(currentBrowseKey);
  window.scrollTo({ top: document.getElementById('page-browse').offsetTop - 100, behavior: 'smooth' });
}

function changeMoviesPage(page) {
  currentMoviesPage = page;

}

// RENDER FUNCTIONS
// ==========================================================================
function renderLatest() {
  const container = document.getElementById('latest-container');
  if (latestData.length > 0) {
    renderHorizontalCards(latestData.slice(0, 15), container);
  } else {
    fetchAPI('latest?page=1').then(d => {
      latestData = d;
      renderHorizontalCards(d.slice(0, 15), container);
    }).catch(() => {
      container.innerHTML = '<div class="w-full text-center text-gray-500">Gagal memuat data</div>';
    });
  }
}

function renderHomeSchedule() {
  const container = document.getElementById('home-schedule');
  const findToday = (data) => data.find(d => d.day === currentDay) || data[0];
  if (scheduleData && scheduleData[0]) {
    const todayData = findToday(scheduleData);
    const items = todayData.animeList.map(a => ({judul: a.anime_name, cover: a.cover, url: a.link}));
    renderHorizontalCards(items.slice(0, 10), container);
  } else {
    fetchAPI('schedule').then(j => {
      if (j.data) {
        scheduleData = j.data;
        scheduleData.sort((a, b) => DAY_ORDER.indexOf(a.day) - DAY_ORDER.indexOf(b.day));
        const todayData = findToday(scheduleData);
        const items = todayData.animeList.map(a => ({judul: a.anime_name, cover: a.cover, url: a.link}));
        renderHorizontalCards(items.slice(0, 10), container);
      }
    }).catch(() => {
      container.innerHTML = '<div class="w-full text-center text-gray-500">Gagal memuat jadwal</div>';
    });
  }
}

function renderHorizontalCards(list, container) {
  let html = '';
  list.forEach(a => {
    const cover = (a.cover || '').replace('?w=100', '?w=300');
    html += `
      <div class="anime-card flex-shrink-0 w-32 cursor-pointer" onclick="loadDetail('${a.url}')">
        <div class="relative overflow-hidden rounded-2xl aspect-[3/4] shadow-lg bg-surface">
          <img class="w-full h-full object-cover" src="${cover}" alt="${a.judul || 'Anime cover'}" loading="lazy" onerror="this.src='https://i0.wp.com/cdn.myanimelist.net/images/global/404.jpg'">
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
        </div>
        <div class="mt-2 px-1"><div class="text-xs font-medium line-clamp-2 leading-tight">${a.judul||'Unknown'}</div></div>
      </div>
    `;
  });
  container.innerHTML = html || '<div class="w-full text-center text-gray-500">Tidak ada data</div>';
}

function renderSchedulePage() {
  if (!scheduleData) {
    fetchAPI('schedule').then(j => {
      scheduleData = j.data;
      if (scheduleData) scheduleData.sort((a, b) => DAY_ORDER.indexOf(a.day) - DAY_ORDER.indexOf(b.day));
      renderDayTabs();
      renderScheduleByDay(currentDay);
    }).catch(() => {
      document.getElementById('schedule-content').innerHTML = '<div class="text-center py-20 text-gray-500">Gagal memuat jadwal</div>';
    });
    return;
  }
  renderDayTabs();
  renderScheduleByDay(currentDay);
}

function renderDayTabs() {
  if (!scheduleData) return;
  let html = '';
  scheduleData.forEach(d => {
    const active = d.day === currentDay ? 'bg-accent text-white shadow-lg shadow-accent/30' : 'bg-surface text-gray-400 border border-white/5';
    html += `<button class="px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 ${active}" onclick="selectDay('${d.day}')">${d.day}</button>`;
  });
  document.getElementById('day-tabs').innerHTML = html;
}

function selectDay(day) {
  currentDay = day;
  renderDayTabs();
  renderScheduleByDay(day);
}

function renderScheduleByDay(day) {
  const data = scheduleData.find(d => d.day === day);
  const container = document.getElementById('schedule-content');
  if (!data) {
    container.innerHTML = '<div class="text-center py-20 text-gray-500">Tidak ada jadwal</div>';
    return;
  }
  let html = '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">';
  data.animeList.forEach(a => {
    html += renderGridCard({judul: a.anime_name, cover: a.cover, url: a.link});
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderMovies() {
  const container = document.getElementById('movies-container');
  const displayMovies = (data) => {
    const start = (currentMoviesPage - 1) * ITEMS_PER_PAGE;
    const items = data.slice(start, start + ITEMS_PER_PAGE);
    let html = '';
    items.forEach(m => { html += renderGridCard(m); });
    container.innerHTML = html || '<div class="text-center py-20 text-gray-500 col-span-full">Tidak ada data</div>';
    renderPaginationUI('movies-pagination', data.length, currentMoviesPage, 'changeMoviesPage');
  };
  if (moviesData.length === 0) {
    fetchAPI('movies').then(d => { moviesData = d; displayMovies(moviesData); }).catch(() => {
      container.innerHTML = '<div class="text-center py-20 text-gray-500 col-span-full">Gagal memuat movies</div>';
    });
  } else {
    displayMovies(moviesData);
  }
}

function renderBrowsePage() {
  document.getElementById('browse-stats').textContent = `Total: ${allAnime.length} anime`;
  const keys = Object.keys(animeListData).sort();
  let html = '';
  keys.forEach(k => {
    const active = k === currentBrowseKey ? 'bg-accent text-white shadow-md shadow-accent/20' : 'bg-surface text-gray-400 border border-white/5';
    html += `<button class="w-10 h-10 flex items-center justify-center rounded-xl text-sm transition-all ${active}" onclick="selectBrowseKey('${k}')">${k}</button>`;
  });
  document.getElementById('az-nav').innerHTML = html;
  renderBrowseContent(currentBrowseKey);
}

function selectBrowseKey(key) {
  currentBrowseKey = key;
  currentBrowsePage = 1;
  renderBrowsePage();
}

function renderBrowseContent(key) {
  const data = animeListData[key] || [];
  const start = (currentBrowsePage - 1) * ITEMS_PER_PAGE;
  const items = data.slice(start, start + ITEMS_PER_PAGE);
  let html = '';
  items.forEach(a => { html += renderGridCard(a); });
  document.getElementById('browse-container').innerHTML = html || '<div class="text-center py-20 text-gray-500 col-span-full">Tidak ada data</div>';
  renderPaginationUI('browse-pagination', data.length, currentBrowsePage, 'changeBrowsePage');
}

function renderGenres() {
  const genreSet = new Set();
  latestData.forEach(a => {
    if(a.genre) a.genre.forEach(g => genreSet.add(g));
  });
  const sortedGenres = Array.from(genreSet).sort();
  let html = '';
  sortedGenres.forEach(g => {
    html += `<button onclick="filterByGenre('${g}')" class="px-4 py-2 bg-surface hover:bg-accent border border-white/5 rounded-xl text-xs transition-all">${g}</button>`;
  });
  document.getElementById('genre-list').innerHTML = html || '<div class="text-gray-500 text-sm italic">Memuat genre dari data terbaru...</div>';
}

function filterByGenre(genre) {
  document.getElementById('genre-title').classList.remove('hidden');
  document.getElementById('active-genre-name').textContent = genre;
  const results = latestData.filter(a => a.genre && a.genre.includes(genre));
  let html = '';
  results.forEach(a => { html += renderGridCard(a); });
  document.getElementById('genre-container').innerHTML = html || '<div class="col-span-full text-center py-10 text-gray-500">Tidak ada data untuk genre ini</div>';
  window.scrollTo({ top: document.getElementById('genre-title').offsetTop - 100, behavior: 'smooth' });
}

function renderGridCard(a) {
  const cover = (a.cover || '').replace('?w=100', '');
  return `
    <div class="anime-card cursor-pointer group" onclick="loadDetail('${a.url}')">
      <div class="relative overflow-hidden rounded-2xl aspect-[3/4] shadow-lg bg-surface">
        <img class="w-full h-full object-cover group-hover:scale-110 duration-500" src="${cover}" alt="${a.judul || a.anime_name || 'Anime cover'}" loading="lazy" onerror="this.src='https://i0.wp.com/cdn.myanimelist.net/images/global/404.jpg'">
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60 group-hover:opacity-100 transition-opacity"></div>
      </div>
      <div class="mt-2 px-1"><div class="text-sm font-medium line-clamp-2 leading-tight">${a.judul||a.anime_name}</div></div>
    </div>
  `;
}

document.getElementById('search-input').addEventListener('input', e => {

    container.innerHTML = '<div class="text-center py-20 text-gray-500 col-span-full">Ketik minimal 2 huruf...</div>';

    return;

  updateMetaTagsSEO(
    `Cari "${q}" - AnimeKita`,

    'https://cloud.tiyan.biz.id/nD6z.jpg',
    `${SITE_URL}/search?q=${encodeURIComponent(q)}`
  );
  let html = '';
  filtered.slice(0,50).forEach(a => { html += renderGridCard(a); });
  container.innerHTML = html;
});

async function playEpisode(url, reso = '720p') {
  const vc = document.getElementById('video-container');
  vc.innerHTML = '<div class="flex flex-col items-center justify-center py-10 gap-3"><div class="w-6 h-6 border-2 border-accent border-t-transparent rounded-full animate-spin"></div><div class="text-gray-500 text-[10px]">Menyambungkan ke server...</div></div>';
  
  try {
    const json = await fetchAPI(`episode?url=${url}&reso=${reso}`);
    const ep = json.data?.[0] || json;
    const streams = ep.stream || [];
    const availableResos = ep.reso || [];
    const link = streams.find(s => s.link?.includes('.mp4')) || streams[0];
    
    if (link) {
      let resoHtml = '';
      if (availableResos.length > 0) {
        resoHtml = `<div class="mt-3 flex flex-wrap gap-2 px-1">`;
        availableResos.forEach(r => {
          const isActive = r === reso || (availableResos.length === 1);
          resoHtml += `<button onclick="playEpisode('${url}', '${r}')" class="px-3 py-1.5 rounded-xl text-[10px] font-semibold transition-all ${isActive ? 'bg-accent text-white shadow-lg shadow-accent/30' : 'bg-surface text-gray-400 border border-white/5 hover:bg-white/5'}">${r}</button>`;
        });
        resoHtml += `</div>`;
      }
      
      vc.innerHTML = `
        <div class="rounded-2xl overflow-hidden bg-black shadow-2xl ring-1 ring-white/10">
          <video class="w-full aspect-video" controls autoplay playsinline>
            <source src="${link.link}" type="video/mp4">
          </video>
        </div>
        ${resoHtml}
        <div class="mt-2 text-[10px] text-gray-600 flex items-center gap-1 px-2">
          <i data-lucide="info" class="w-3 h-3"></i>
          <span>Resolusi: <span class="text-accent font-medium">${link.reso || reso}</span></span>
          <span class="mx-1">•</span>
          <span class="truncate">${link.link.substring(0, 30)}...</span>
        </div>
      `;
      lucide.createIcons();
      document.getElementById('player-sheet').scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      vc.innerHTML = '<div class="bg-red-500/10 text-red-400 p-6 rounded-2xl text-center text-xs">Video tidak tersedia untuk episode ini</div>';
    }
  } catch(e) {
    vc.innerHTML = '<div class="bg-red-500/10 text-red-400 p-6 rounded-2xl text-center text-xs">Gagal memuat video</div>';
  }
}

function openPlayer() {
  if (document.getElementById('sidebar').classList.contains('translate-x-0')) toggleSidebar();
  document.getElementById('player-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('opacity-100', 'visible');
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  document.getElementById('player-sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('opacity-100', 'visible');
  document.body.style.overflow = '';
  const video = document.querySelector('video');
  if (video) video.pause();
  switchPage(currentPage);
  const oldSchema = document.getElementById('anime-schema');
  if (oldSchema) oldSchema.remove();
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  if (sidebar.classList.contains('translate-x-0')) {
    sidebar.classList.remove('translate-x-0');
    sidebar.classList.add('-translate-x-full');
    if (!document.getElementById('player-sheet').classList.contains('open')) overlay.classList.remove('opacity-100', 'visible');
  } else {
    if (document.getElementById('player-sheet').classList.contains('open')) closePlayer();
    sidebar.classList.remove('-translate-x-full');
    sidebar.classList.add('translate-x-0');
    overlay.classList.add('opacity-100', 'visible');
  }
}

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onscroll = function() {
  const btn = document.getElementById('scroll-top');
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    btn.classList.remove('opacity-0', 'invisible', 'translate-y-10');
    btn.classList.add('opacity-100', 'visible', 'translate-y-0');
  } else {
    btn.classList.add('opacity-0', 'invisible', 'translate-y-10');
    btn.classList.remove('opacity-100', 'visible', 'translate-y-0');
  }
};

function toggleSynopsis() {
  const text = document.getElementById('synopsis-text');
  const btn = document.getElementById('btn-synopsis');
  if (text.classList.contains('line-clamp-3')) {
    text.classList.remove('line-clamp-3');
    btn.innerHTML = `SEMBUNYIKAN <i data-lucide="chevron-up" class="w-3 h-3"></i>`;
  } else {
    text.classList.add('line-clamp-3');
    btn.innerHTML = `BACA SELENGKAPNYA <i data-lucide="chevron-down" class="w-3 h-3"></i>`;
  }
  lucide.createIcons();
}

// ==========================================================================
// API TESTER
// ==========================================================================
function renderAPITester() {
  document.getElementById('api-response').innerHTML = '<div class="text-gray-500 text-sm">Klik tombol di atas untuk menguji API...</div>';
}

async function testAPI(endpoint) {
  document.getElementById('api-endpoint').value = endpoint;
  await testCustomAPI();
}

async function testCustomAPI() {
  const endpoint = document.getElementById('api-endpoint').value.trim();
  const container = document.getElementById('api-response');
  if (!endpoint) {
    container.innerHTML = '<div class="text-red-400 text-sm">Masukkan endpoint terlebih dahulu!</div>';
    return;
  }
  
  container.innerHTML = '<div class="flex items-center gap-3 text-gray-400"><div class="w-4 h-4 border-2 border-accent border-t-transparent rounded-full animate-spin"></div> Memuat...</div>';
  
  try {
    const data = await fetchAPI(endpoint);
    container.innerHTML = `
      <div class="mb-2 text-xs text-green-400">✓ Berhasil (${Array.isArray(data) ? data.length : Object.keys(data).length} item)</div>
      <pre class="text-xs text-gray-300 overflow-auto whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>
    `;
  } catch(e) {
    container.innerHTML = `<div class="text-red-400 text-sm">Error: ${e.message}</div>`;
  }
}

window.selectDay = selectDay;

window.changeBrowsePage = changeBrowsePage;
window.changeMoviesPage = changeMoviesPage;
window.scrollToTop = scrollToTop;

window.testAPI = testAPI;

console.log('✅ AnimeKita SEO Ready with all APIs and CORS proxy!');
